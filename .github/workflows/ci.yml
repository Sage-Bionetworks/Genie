# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: build

on:
  push:
    branches: [main, develop, 'GEN*', 'gen*']
    paths-ignore:
      - '**.md'                            # All Markdown files
      - '**/docs/**'                       # Documentation directory
      - '.github/workflows/codeql.yml'     # Code scanner
      - '.github/workflows/build_docs.yml' # mkdocs GH workflow

  pull_request:
      types:
        - opened
        - reopened

  release:
    types:
      - created

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEST_PROJECT_SYNID: syn7208886        # synapse_id of the test synapse project
  TEST_SEQ_DATE: Jul-2022               # SEQ_DATE to use for test pipeline. Should match the one used in nf-genie.

jobs:

  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      non-test-changes: ${{ steps.get-changes.outputs.non-test-changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Determine Changes
        id: get-changes
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "Handling a push event..."
            ALL_CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Handling a pull request event..."
            git fetch origin ${{ github.base_ref }}
            ALL_CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          fi
          echo "All Changed Files: $ALL_CHANGED_FILES"
          NON_TEST_CHANGES=$(echo "$ALL_CHANGED_FILES" | grep -v '^tests/' || true)
          echo "Non-Test Changes: $NON_TEST_CHANGES"
          echo "::set-output name=non-test-changes::$NON_TEST_CHANGES"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get install -y bedtools
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov cython
        pip install .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    # - name: Lint with flake8
    #   run: |
    #     # stop the build if there are Python syntax errors or undefined names
    #     flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    #     # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
    #     flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest tests/ --cov=genie --cov=genie_registry --cov-report=html
    - name: Upload pytest test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: htmlcov
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}


  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
            version: "~=23.12"

  build-container:
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      - name: Format tags as registry refs
        id: registry_refs
        env:
          TAGS: ${{ steps.meta.outputs.json }}
        run: |
          echo tags=$(echo $TAGS | jq '.tags[] | "type=registry,ref=" + . + "_cache"| @text') >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        if: github.event_name != 'pull_request'
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ steps.registry_refs.outputs.tags }},mode=max
          cache-to: ${{ steps.registry_refs.outputs.tags }},mode=max
  
          jobs:

  extract-branch-name:
    needs: [determine-changes, lint, test, build-container]
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.extract_branch.outputs.branch_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Extract Branch Name
        id: extract_branch
        run: |
          if [ "$GITHUB_HEAD_REF" != "" ]; then
            echo "branch_name=$GITHUB_HEAD_REF" >> $GITHUB_OUTPUT
          else
            echo "branch_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

  integration-tests:
    needs: [determine-changes, lint, test, build-container, extract-branch-name]
    runs-on: ubuntu-latest
    outputs:
      workflow_id: ${{ steps.run.outputs.workflowId }}
      workspace_id: ${{ steps.run.outputs.workspaceId }}
    steps:
      # Launch workflow using Tower CLI tool action
      - name: Launch validation workflow via tower
        uses: seqeralabs/action-tower-launch@v2
        with:
          workspace_id: ${{ secrets.TOWER_WORKSPACE_ID }}
          access_token: ${{ secrets.TOWER_ACCESS_TOKEN }}
          revision: ${{ needs.extract-branch-name.outputs.branch_name }}
          workdir: s3://${{ secrets.TOWER_AWS_S3_BUCKET }}/work
          pipeline: https://github.com/Sage-Bionetworks-Workflows/nf-genie
          run_name: integration-tests
          pre_run_script: "export NXF_OPTS='-Xms4g -Xmx12g'"
          parameters: |
            {
              "process_type": "only_validate",
              "center": "ALL",
              "release": "TEST.consortium",
              "main_pipeline_docker": "${{ env.REGISTRY }}/sage-bionetworks/genie:${{ env.BRANCH_NAME }}"
            }
          profiles: aws_prod
      
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Pipeline launched, monitor progress [here](${{ steps.runs.outputs.workflowUrl }})
            Details:
              - Workflow ID: ${{ steps.runs.outputs.workflowId }}
              - Workspace: ${{ steps.runs.outputs.WorkspaceRef }}
              - Workspace ID: ${{ steps.runs.outputs.workspaceId }}
              - Workflow URL: ${{ steps.runs.outputs.workflowUrl }}
          comment_tag: towerrun


  deploy:
    needs: [test, lint, build-container, integration-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel build
    - name: Build distributions
      run: python -m build
    - name: Publish to pypi
      uses: pypa/gh-action-pypi-publish@release/v1